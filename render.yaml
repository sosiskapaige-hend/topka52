services:
  - type: web
    name: topka52
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBAPP_URL
        value: https://topka52.onrender.com/app/index.html
      - key: XROCKET_API_URL
        value: https://pay.xrocket.tg/
      - key: XROCKET_API_KEY
        sync: false
      - key: XROCKET_CURRENCY
        value: USDT
      - key: ENABLE_XROCKET_POLL
        value: "true"
      - key: XROCKET_POLL_INTERVAL
        value: "60"
      - key: BOT_NAME
        value: quantumcryptobot
      - key: WALLET_ADDRESS
        sync: false
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
